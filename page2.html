<style>
        body { font-family: 'Space Mono', monospace; background-color: #000; overflow: hidden; margin: 0; padding: 0; }
        .pixel-border { box-shadow: 0 0 0 4px #2d322b, 0 0 0 8px #753401; }
        .wood-texture { background-color: #934b19; background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,0,0,0.1) 10px, rgba(0,0,0,0.1) 20px); }
        .parchment { 
            background-color: #fdf5e6; 
            border: 6px solid #321200; 
            position: relative;
            box-shadow: 10px 10px 0px 0px rgba(0,0,0,0.5);
        }
        .parchment::before, .parchment::after { 
            content: '◈'; 
            position: absolute; 
            left: 50%; 
            transform: translateX(-50%); 
            color: #321200; 
            font-size: 24px; 
        }
        .parchment::before { top: -20px; }
        .parchment::after { bottom: -20px; }
        
        .scanline {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            position: absolute;
            top: 0;
            z-index: 60;
            pointer-events: none;
            animation: scan 4s linear infinite;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .animate-blink { animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* Retro RPG Cursor/Marker style */
        .rpg-prompt::before {
            content: '▶';
            margin-right: 8px;
            color: #116b1f;
        }

        /* 8-bit Progress Bar */
        .progress-container {
            width: 100%;
            height: 24px;
            background: #dfe4da;
            border: 4px solid #321200;
            position: relative;
            image-rendering: pixelated;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: #116b1f;
            transition: width 0.1s linear;
        }
        .progress-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: linear-gradient(90deg, transparent 90%, rgba(50, 18, 0, 0.2) 90%);
            background-size: 20px 100%;
            pointer-events: none;
        }
    </style>
<style>@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }</style></head>

                    LIHAT HASIL
                </button>

<script>
        const statusLines = [
            "Initializing neural scan...",
            "Scanning cuteness...",
            "Scanning mood...",
            "Scanning hidden anger...",
            "Scanning stress level...",
            "Scanning cuteness (double check)...",
            "Compiling results..."
        ];
        
        const container = document.getElementById('status-container');
        const progressBar = document.getElementById('progress-bar');
        const percentEl = document.getElementById('progress-percent');
        const resultBtn = document.getElementById('result-btn');
        
        const duration = 6000; // 6 seconds
        const startTime = Date.now();
        let currentLineIndex = -1;
        
        function updateUI() {
            const elapsed = Date.now() - startTime;
            const progress = Math.min(elapsed / duration, 1);
            
            // Update Progress Bar
            progressBar.style.width = (progress * 100) + '%';
            percentEl.textContent = Math.floor(progress * 100) + '%';
            
            // Append scanning lines line-by-line
            const nextLineIndex = Math.floor(progress * (statusLines.length - 0.01));
            
            if (nextLineIndex > currentLineIndex) {
                for(let i = currentLineIndex + 1; i <= nextLineIndex; i++) {
                    const lineDiv = document.createElement('div');
                    lineDiv.className = 'flex items-start opacity-0 animate-[fadeIn_0.2s_ease-in_forwards]';
                    lineDiv.innerHTML = `<span class="rpg-prompt text-on-surface">${statusLines[i]}</span>`;
                    container.appendChild(lineDiv);
                    
                    // Auto-scroll to bottom of the list
                    const bootText = document.getElementById('boot-text');
                    bootText.scrollTop = bootText.scrollHeight;
                    
                    playRetroSound(440 + (i * 100), 0.05); // Increasing pitch for each line
                }
                currentLineIndex = nextLineIndex;
            }
            
            // Show Button ONLY after 100% progress
            if (progress >= 1 && resultBtn.classList.contains('hidden')) {
                resultBtn.classList.remove('hidden');
                resultBtn.classList.add('block');
                
                const completeLine = document.createElement('div');
                completeLine.className = 'flex items-start text-primary font-bold mt-2 opacity-0 animate-[fadeIn_0.2s_ease-in_forwards]';
                completeLine.innerHTML = `<span class="rpg-prompt">Scan Complete.</span>`;
                container.appendChild(completeLine);
                
                playRetroSound(880, 0.3); // Success beep
            }
            
            if (progress < 1) {
                requestAnimationFrame(updateUI);
            }
        }

        function playRetroSound(freq, durationSec) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
                
                gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + durationSec);
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + durationSec);
            } catch(e) { /* Audio context might be blocked */ }
        }

        // Add fadeIn animation via JS to keep CSS clean
        const style = document.createElement('style');
        style.textContent = `@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }`;
        document.head.appendChild(style);

        // Start sequence after a small delay
        setTimeout(() => {
            updateUI();
        }, 300);

        // Micro-interaction for UI buttons
        document.querySelectorAll('button').forEach(el => {
            el.addEventListener('click', () => {
                playRetroSound(1046.50, 0.1);
            });
        });
    </script>
