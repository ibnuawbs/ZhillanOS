<style>
        body { font-family: 'Space Mono', monospace; background-color: #000; overflow: hidden; margin: 0; padding: 0; }
        .pixel-border { box-shadow: 0 0 0 4px #2d322b, 0 0 0 8px #753401; }
        .wood-texture { background-color: #934b19; background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,0,0,0.1) 10px, rgba(0,0,0,0.1) 20px); }
        .parchment { 
            background-color: #fdf5e6; 
            border: 6px solid #321200; 
            position: relative;
            box-shadow: 10px 10px 0px 0px rgba(0,0,0,0.5);
        }
        .parchment::before, .parchment::after { 
            content: '◈'; 
            position: absolute; 
            left: 50%; 
            transform: translateX(-50%); 
            color: #321200; 
            font-size: 24px; 
        }
        .parchment::before { top: -20px; }
        .parchment::after { bottom: -20px; }
        
        .scanline {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            position: absolute;
            top: 0;
            z-index: 60;
            pointer-events: none;
            animation: scan 4s linear infinite;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .animate-blink { animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        .floating { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* Retro RPG Cursor/Marker style */
        .rpg-prompt::before {
            content: '▶';
            margin-right: 8px;
            color: #116b1f;
        }
    </style>

<body class="flex flex-col h-screen w-screen relative">
<div class="scanline"></div>
<!-- Fullscreen Background -->
<div class="fixed inset-0 z-0">
<img alt="vibrant 8-bit pixel art landscape" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida/ADBb0uihzOr91e_5wo_cTu5Hjr_rmsm9p3zBm1MdkRsXewOGGT1E1OihIGmYnldIixNf4cwoGlAukcAR3exftUR75mjDuk1ROdhAO5abA8SEFbf-4Q_J78kKxoili4PJfcozSNHDgOSaqj9l0a7x2afKfRg-pyvUlbA5R5thlRR3VeCDgA5faXc80YMjD5i4zIn_8rWkmpTHFxmlGscM56aCueQGPEhmDoJkIpjR3OEhFvYpD6vovPMs5Jcve7Fy"/>
</div>
<!-- Top Navigation (Styled as HUD) -->
<header class="fixed top-0 left-0 right-0 h-16 z-50 wood-texture border-b-4 border-on-secondary-fixed-variant flex justify-between items-center px-margin-mobile">
<div class="font-headline-lg-mobile text-headline-lg-mobile font-bold uppercase tracking-widest text-on-primary">ZHILLAN OS</div>
<div class="flex gap-2">
<button class="bg-secondary-container p-2 border-2 border-on-secondary-fixed text-on-secondary-fixed shadow-[2px_2px_0px_0px_rgba(50,18,0,1)] hover:translate-y-0.5 hover:shadow-none transition-all">
<span class="material-symbols-outlined text-lg" data-icon="map">map</span>
</button>
<button class="bg-secondary-container p-2 border-2 border-on-secondary-fixed text-on-secondary-fixed shadow-[2px_2px_0px_0px_rgba(50,18,0,1)] hover:translate-y-0.5 hover:shadow-none transition-all">
<span class="material-symbols-outlined text-lg" data-icon="inventory_2">inventory_2</span>
</button>
<button class="bg-secondary-container p-2 border-2 border-on-secondary-fixed text-on-secondary-fixed shadow-[2px_2px_0px_0px_rgba(50,18,0,1)] hover:translate-y-0.5 hover:shadow-none transition-all">
<span class="material-symbols-outlined text-lg" data-icon="settings">settings</span>
</button>
</div>
</header>
<!-- Main Content Area centered -->
<main class="flex-grow relative z-20 flex items-center justify-center p-4">
<!-- Centered Dialogue Box -->
<div class="relative w-full max-w-md parchment p-8 flex flex-col items-center">
<div class="w-full font-body-md text-on-surface mb-8 min-h-[140px] flex flex-col gap-2" id="boot-text">
<!-- Lines will be injected here by JS -->
</div>
<!-- Main Action Button -->
<button class="hidden font-headline-lg-mobile text-headline-lg-mobile bg-primary text-on-primary border-4 border-on-primary px-10 py-4 shadow-[6px_6px_0px_0px_rgba(0,0,0,0.5)] hover:translate-y-1 hover:shadow-[2px_2px_0px_0px_rgba(0,0,0,0.5)] active:translate-y-2 active:shadow-none transition-all uppercase tracking-tight" id="start-btn">
                MULAI SCAN
            </button>
</div>
</main>
<script>
        const lines = [
            'Initializing system...',
            'Loading Zhillan Database...',
            'WARNING:',
            'Cute creature detected.'
        ];
        
        const container = document.getElementById('boot-text');
        const startBtn = document.getElementById('start-btn');
        let currentLine = 0;

        function typeLine() {
            if (currentLine < lines.length) {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'flex items-start';
                
                const text = document.createElement('span');
                text.className = 'font-bold rpg-prompt';
                
                if (lines[currentLine].includes('WARNING')) {
                    text.classList.add('text-error', 'animate-blink');
                } else if (lines[currentLine].includes('Cute')) {
                    text.classList.add('text-primary');
                } else {
                    text.classList.add('text-on-surface');
                }
                
                lineDiv.appendChild(text);
                container.appendChild(lineDiv);

                let charIndex = 0;
                const typing = setInterval(() => {
                    if (charIndex < lines[currentLine].length) {
                        text.textContent += lines[currentLine][charIndex];
                        charIndex++;
                    } else {
                        clearInterval(typing);
                        currentLine++;
                        setTimeout(typeLine, 800);
                    }
                }, 40);
            } else {
                // Show button after sequence finishes
                startBtn.classList.remove('hidden');
                startBtn.classList.add('block');
            }
        }

        // Slight initial delay for boot atmosphere
        setTimeout(typeLine, 800);

        // Sound effect micro-interaction for retro feel
        document.querySelectorAll('button').forEach(el => {
            el.addEventListener('click', () => {
                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    
                    oscillator.type = 'square';
                    oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                    oscillator.frequency.exponentialRampToValueAtTime(1046.50, audioCtx.currentTime + 0.1); // C6
                    
                    gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.1);
                } catch(e) { /* Audio context might be blocked */ }
            });
        });
  startBtn.addEventListener('click', () => {
    window.location.href = "/page2.html";
});
    </script>
