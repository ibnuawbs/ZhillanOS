<script>
        // Typing effect for the conclusion or generic logging
        const conclusionText = document.querySelector('.text-on-secondary-container');
        if (conclusionText) {
            const originalText = conclusionText.innerText;
            conclusionText.innerText = '';
            let i = 0;
            const typing = setInterval(() => {
                if (i < originalText.length) {
                    conclusionText.innerText += originalText.charAt(i);
                    i++;
                } else {
                    clearInterval(typing);
                }
            }, 50);
        }

        // Active state handling for top nav
        const navLinks = document.querySelectorAll('nav a');
        navLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                navLinks.forEach(l => {
                    l.classList.remove('text-on-secondary', 'border-b-4', 'border-primary-fixed');
                    l.classList.add('text-secondary-fixed-dim', 'opacity-80');
                });
                link.classList.add('text-on-secondary', 'border-b-4', 'border-primary-fixed');
                link.classList.remove('text-secondary-fixed-dim', 'opacity-80');
            });
        });
