<style>

<script>
        const celebrateBtn = document.getElementById('celebrate-btn');

        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            
            const types = ['🎈', '❤️', '💖', '✨', '🌸', '💝'];
            const type = types[Math.floor(Math.random() * types.length)];
            particle.textContent = type;
            
            const startX = Math.random() * window.innerWidth;
            const duration = 4000 + Math.random() * 5000;
            // Noticeably larger sizes
            const size = 32 + Math.random() * 40;
            const sway = 40 + Math.random() * 80;
            
            particle.style.left = startX + 'px';
            particle.style.fontSize = size + 'px';
            
            document.body.appendChild(particle);

            const animation = particle.animate([
                { transform: `translateY(0) translateX(0)`, opacity: 1 },
                { transform: `translateY(-${window.innerHeight / 2}px) translateX(${sway}px)`, opacity: 1 },
                { transform: `translateY(-${window.innerHeight + 200}px) translateX(${-sway}px)`, opacity: 0 }
            ], {
                duration: duration,
                easing: 'linear'
            });

            animation.onfinish = () => particle.remove();
        }

        celebrateBtn.addEventListener('click', () => {
            // Trigger haptic-like sound
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1);
            } catch(e) {}

            // Significantly increased quantity of objects (initial burst)
            for (let i = 0; i < 150; i++) {
                setTimeout(createParticle, i * 20);
            }
            
            // Continuous lush stream for a while
            const interval = setInterval(createParticle, 50);
            setTimeout(() => clearInterval(interval), 6000);
        });
    </script>
