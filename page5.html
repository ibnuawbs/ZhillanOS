    <style>
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .animate-blink {
            animation: blink 0.5s step-end infinite;
        }
        .pixel-border {
            box-shadow: 
                0 -4px 0 0 #321200,
                0 4px 0 0 #321200,
                -4px 0 0 0 #321200,
                4px 0 0 0 #321200;
        }
        .pixel-shadow {
            box-shadow: 4px 4px 0px 0px rgba(50,18,0,1);
        }
        .pixel-shadow-active {
            box-shadow: 0px 0px 0px 0px rgba(50,18,0,1);
            transform: translateY(4px);
        }
    </style>

<body class="bg-black min-h-screen flex flex-col font-body-md overflow-hidden">
    <!-- TopAppBar -->
    <header class="bg-secondary dark:bg-on-secondary-fixed-variant text-on-secondary dark:text-secondary-fixed font-label-md text-label-md docked full-width top-0 border-b-4 border-on-secondary-container shadow-[4px_4px_0px_0px_rgba(50,18,0,1)] flex justify-between items-center w-full px-margin-mobile py-2 z-50">
        <div class="font-headline-lg-mobile text-headline-lg-mobile uppercase text-on-secondary dark:text-secondary-fixed">
            ZHILLAN OS
        </div>
        <div class="flex items-center gap-4">
            <button class="hover:bg-on-secondary-fixed-variant transition-all active:translate-y-1 active:shadow-none p-1">
                <span class="material-symbols-outlined" data-icon="settings">settings</span>
            </button>
        </div>
    </header>

    <!-- Main Canvas -->
    <main class="flex-grow flex flex-col items-center justify-center px-margin-mobile text-center gap-8">
        <!-- Error Messaging -->
        <div class="flex flex-col gap-4">
            <h1 class="text-error font-headline-xl text-headline-xl animate-blink tracking-tighter">
                SYSTEM OVERLOAD
            </h1>
            <p class="text-white font-body-lg text-body-lg opacity-90">
                karena Zhillan terlalu lucuu..
            </p>
        </div>
        
        <!-- Progress Section -->
        <div class="w-full max-w-md flex flex-col items-center gap-6">
            <div class="w-full flex flex-col gap-2">
                <div class="flex justify-between items-end">
                    <span class="text-primary-fixed font-label-md text-label-md uppercase">memperbaiki sistem</span>
                    <span class="text-white font-label-md text-label-md" id="progress-percent">0%</span>
                </div>
                <!-- Retro Progress Bar -->
                <div class="w-full h-8 bg-surface-container-highest border-4 border-on-secondary-container p-1 overflow-hidden">
                    <div class="h-full bg-primary w-0 transition-all duration-100 ease-linear" id="progress-bar" style="box-shadow: inset -4px 0 0 rgba(0,0,0,0.2);"></div>
                </div>
            </div>
            
            <!-- Action Button (Hidden Initially) -->
            <div class="opacity-0 transition-opacity duration-500 pointer-events-none" id="button-container">
                <button id="next-page-btn" class="bg-primary text-on-primary font-label-md text-label-md uppercase px-12 py-4 border-4 border-on-primary-fixed-variant shadow-[4px_4px_0px_0px_rgba(50,18,0,1)] hover:bg-on-primary-fixed-variant active:translate-y-1 active:shadow-none transition-all">
                    NEXT
                </button>
            </div>
        </div>
    </main>

    <!-- Background Glitch Effect -->
    <div class="fixed inset-0 pointer-events-none z-[-1] opacity-10">
        <div class="absolute inset-0 bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,0,0,0.25)_50%),linear-gradient(90deg,rgba(255,0,0,0.06),rgba(0,255,0,0.02),rgba(0,0,255,0.06))] bg-[length:100%_4px,3px_100%]"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const progressBar = document.getElementById('progress-bar');
            const progressPercent = document.getElementById('progress-percent');
            const buttonContainer = document.getElementById('button-container');
            const nextBtn = document.getElementById('next-page-btn');
            
            let progress = 0;
            const duration = 5000; // 5 seconds
            const intervalTime = 50; // Update every 50ms
            const step = (100 / (duration / intervalTime));

            const loadingTimer = setInterval(() => {
                progress += step;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(loadingTimer);
                    
                    // Show the button
                    buttonContainer.classList.remove('opacity-0', 'pointer-events-none');
                    buttonContainer.classList.add('opacity-100');
                }
                
                progressBar.style.width = `${progress}%`;
                progressPercent.textContent = `${Math.round(progress)}%`;
            }, intervalTime);

            // Handler klik dipasang di dalam DOMContentLoaded setelah button di-render
            if (nextBtn) {
                nextBtn.addEventListener('click', () => {
                    window.location.href = "/page6.html";
                });
            }
        });
    </script>
</body>
</html>
